<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f8fafc;font-family:Arial,sans-serif;color:#1e293b">
    <div style="max-width:560px;margin:32px auto;padding:32px;background:#fff;border-radius:16px">
      <h2 style="margin:0 0 16px;color:#2c333a">Welcome to Biti's Management</h2>
      <p style="line-height:1.6">Hello {{ .Data.full_name }},</p>
      <p style="line-height:1.6">
        You have been invited to join the Biti's Management System as
        <strong>{{ .Data.role }}</strong>.
      </p>
      <p style="margin:28px 0">
        <a href="{{ .ConfirmationURL }}"
          style="display:inline-block;padding:13px 22px;border-radius:10px;background:#e30016;color:#fff;text-decoration:none;font-weight:bold">
          Accept invitation and create password
        </a>
      </p>
      <p style="font-size:13px;line-height:1.6;color:#64748b">
        This secure link opens the official website:
        https://bitis-management-system.vercel.app
      </p>
    </div>
  </body>
</html>
