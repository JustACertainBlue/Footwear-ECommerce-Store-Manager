<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Forgot Password - Bitis's Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-200 p-6"
    style="font-family: Inter, sans-serif;">
    <main class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-2xl shadow-slate-300/50 border border-slate-100 p-10">
            <div class="w-14 h-14 bg-[#E30016] rounded-2xl flex items-center justify-center text-white text-2xl font-black mb-6">
                B
            </div>
            <h1 class="text-2xl font-black text-[#2C333A]">Reset your password</h1>
            <p class="text-sm text-slate-500 mt-2 mb-8">
                Enter your staff email. If an account exists, Supabase will send a secure recovery link.
            </p>

            <form id="resetForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Email</label>
                    <input id="email" type="email" required autocomplete="email"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-4 focus:ring-2 focus:ring-[#E30016] focus:bg-white outline-none transition-all"
                        placeholder="name@bitis.com.vn">
                </div>
                <button id="submitBtn" type="submit"
                    class="w-full py-4 bg-[#E30016] text-white rounded-xl font-bold hover:bg-red-700 disabled:opacity-60 transition-all">
                    Send recovery link
                </button>
            </form>

            <div id="message" role="status"
                class="hidden mt-6 p-4 rounded-xl text-sm font-medium border"></div>
            <a href="login.html" class="block text-center text-sm text-slate-500 font-bold hover:text-[#E30016] mt-7">
                Back to login
            </a>
        </div>
    </main>

    <script>
        const form = document.getElementById('resetForm');
        const button = document.getElementById('submitBtn');
        const message = document.getElementById('message');
        let cooldownTimer = null;

        function showMessage(text, type = 'success') {
            const styles = type === 'success'
                ? 'bg-emerald-50 border-emerald-100 text-emerald-700'
                : 'bg-red-50 border-red-100 text-red-700';
            message.textContent = text;
            message.className = `mt-6 p-4 rounded-xl text-sm font-medium border ${styles}`;
        }

        function getRecoveryErrorMessage(error) {
            if (error?.status === 429 || error?.code === 'over_email_send_rate_limit') {
                return 'Supabase has reached its email sending limit. Please wait and try again later, or configure a custom SMTP provider.';
            }

            return error?.message || 'Unable to send the recovery email. Please try again.';
        }

        function startCooldown(seconds) {
            let remaining = seconds;
            button.disabled = true;
            button.textContent = `Try again in ${remaining}s`;
            cooldownTimer = window.setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    window.clearInterval(cooldownTimer);
                    button.disabled = false;
                    button.textContent = 'Send recovery link';
                    return;
                }
                button.textContent = `Try again in ${remaining}s`;
            }, 1000);
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (button.disabled) return;

            button.disabled = true;
            button.textContent = 'Sending...';
            message.className = 'hidden';

            const email = document.getElementById('email').value.trim().toLowerCase();
            const redirectTo = window.getAuthRedirectUrl();

            const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });
            if (error) {
                console.error('Password recovery request failed:', error);
                showMessage(getRecoveryErrorMessage(error), 'error');
                button.disabled = false;
                button.textContent = 'Send recovery link';
                return;
            }

            showMessage('If an account exists for that email, a recovery link has been sent. Check your inbox and spam folder.');
            startCooldown(60);
        });
    </script>
</body>

</html>
