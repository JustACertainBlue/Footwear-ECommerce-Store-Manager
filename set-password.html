<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Set Password - Bitis's Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-200 p-6"
    style="font-family: Inter, sans-serif;">
    <main class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-2xl shadow-slate-300/50 border border-slate-100 p-10">
            <div class="w-14 h-14 bg-[#E30016] rounded-2xl flex items-center justify-center text-white text-2xl font-black mb-6">
                B
            </div>
            <h1 class="text-2xl font-black text-[#2C333A]">Create a new password</h1>
            <p id="description" class="text-sm text-slate-500 mt-2 mb-8">
                Verifying your secure link...
            </p>

            <form id="passwordForm" class="space-y-5 hidden">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">New password</label>
                    <div class="relative">
                        <input id="password" type="password" required minlength="8" autocomplete="new-password"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-4 pr-12 py-4 focus:ring-2 focus:ring-[#E30016] focus:bg-white outline-none transition-all"
                            placeholder="At least 8 characters">
                        <button type="button" data-password-toggle
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 focus:outline-none focus:text-[#E30016] transition-colors"
                            aria-label="Show password"></button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Confirm password</label>
                    <div class="relative">
                        <input id="confirmPassword" type="password" required minlength="8" autocomplete="new-password"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-4 pr-12 py-4 focus:ring-2 focus:ring-[#E30016] focus:bg-white outline-none transition-all"
                            placeholder="Repeat your password">
                        <button type="button" data-password-toggle
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 focus:outline-none focus:text-[#E30016] transition-colors"
                            aria-label="Show password"></button>
                    </div>
                </div>
                <button id="submitBtn" type="submit"
                    class="w-full py-4 bg-[#E30016] text-white rounded-xl font-bold hover:bg-red-700 disabled:opacity-60 transition-all">
                    Save password
                </button>
            </form>

            <div id="message" role="status"
                class="hidden mt-6 p-4 rounded-xl text-sm font-medium border"></div>
            <a href="login.html" class="block text-center text-sm text-slate-500 font-bold hover:text-[#E30016] mt-7">
                Back to login
            </a>
        </div>
    </main>

    <script>
        const form = document.getElementById('passwordForm');
        const button = document.getElementById('submitBtn');
        const message = document.getElementById('message');
        const description = document.getElementById('description');

        function showMessage(text, type = 'error') {
            const styles = type === 'success'
                ? 'bg-emerald-50 border-emerald-100 text-emerald-700'
                : 'bg-red-50 border-red-100 text-red-700';
            message.textContent = text;
            message.className = `mt-6 p-4 rounded-xl text-sm font-medium border ${styles}`;
        }

        async function initialize() {
            const queryParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.slice(1));
            const errorDescription = queryParams.get('error_description') || hashParams.get('error_description');
            if (errorDescription) {
                description.textContent = 'This link cannot be used.';
                showMessage(decodeURIComponent(errorDescription));
                return;
            }

            const showFormForSession = (session) => {
                if (!session) return false;
                description.textContent = 'Choose a password with at least 8 characters.';
                form.classList.remove('hidden');
                return true;
            };

            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (showFormForSession(session)) return;

            const sessionReceived = await new Promise((resolve) => {
                const timeout = window.setTimeout(() => resolve(false), 2500);
                const { data: listener } = window.supabaseClient.auth.onAuthStateChange((event, nextSession) => {
                    if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
                        window.clearTimeout(timeout);
                        listener.subscription.unsubscribe();
                        resolve(showFormForSession(nextSession));
                    }
                });
            });

            if (!sessionReceived) {
                description.textContent = 'This link is invalid or has expired.';
                showMessage('Request a new invitation or password recovery email.');
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            message.className = 'hidden';

            const password = document.getElementById('password').value;
            const confirmation = document.getElementById('confirmPassword').value;
            if (password.length < 8) {
                showMessage('Password must contain at least 8 characters.');
                return;
            }
            if (password !== confirmation) {
                showMessage('The passwords do not match.');
                return;
            }

            button.disabled = true;
            button.textContent = 'Saving...';
            const { error } = await window.supabaseClient.auth.updateUser({ password });
            if (error) {
                showMessage(error.message || 'Unable to update the password.');
                button.disabled = false;
                button.textContent = 'Save password';
                return;
            }

            showMessage('Password saved. Redirecting to login...', 'success');
            form.classList.add('hidden');
            await window.supabaseClient.auth.signOut();
            window.setTimeout(() => {
                window.location.replace('login.html');
            }, 1200);
        });

        initialize();
    </script>
    <script src="assets/js/password-toggle.js"></script>
</body>

</html>
