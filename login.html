<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Bitis's Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .login-gradient {
            background: linear-gradient(135deg, #F8F9FA 0%, #E2E8F0 100%);
        }

        .bitis-shimmer {
            background: linear-gradient(90deg, #E30016, #2C333A, #E30016);
            background-size: 200% auto;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }
    </style>
</head>

<body class="login-gradient min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <!-- Logo Area -->
        <div class="flex flex-col items-center mb-10">
            <div
                class="w-16 h-16 bg-[#E30016] rounded-2xl flex items-center justify-center shadow-xl shadow-red-200 mb-4">
                <span class="material-symbols-outlined text-white text-4xl"
                    style="font-variation-settings: 'FILL' 1;">dataset</span>
            </div>
            <h1 class="text-3xl font-black text-[#2C333A] tracking-tight">Bitis's <span
                    class="text-[#E30016]">Management</span></h1>
            <p class="text-slate-500 font-medium mt-1">Product & Order Terminal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-3xl shadow-2xl shadow-slate-300/50 border border-slate-100 p-10">
            <h2 class="text-xl font-bold text-slate-800 mb-2">Internal Access</h2>
            <p class="text-sm text-slate-500 mb-8">Secure terminal for authorized Bitis's personnel.</p>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Employee
                        Email</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                        <input id="email" type="email" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-12 pr-4 py-4 focus:ring-2 focus:ring-[#E30016] focus:bg-white outline-none transition-all"
                            placeholder="name@bitis.com.vn">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Password</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                        <input id="password" type="password" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-12 pr-12 py-4 focus:ring-2 focus:ring-[#E30016] focus:bg-white outline-none transition-all"
                            placeholder="••••••••">
                        <button type="button" data-password-toggle
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 focus:outline-none focus:text-[#E30016] transition-colors"
                            aria-label="Show password"></button>
                    </div>
                </div>

                <div class="flex items-center justify-between py-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox"
                            class="w-4 h-4 rounded border-slate-300 text-[#E30016] focus:ring-[#E30016]">
                        <span class="text-sm text-slate-600 font-medium">Remember terminal</span>
                    </label>
                    <a href="forgot-password.html"
                        class="text-sm text-[#E30016] font-bold hover:underline">Forgot password?</a>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-4 bitis-shimmer text-white rounded-xl font-bold text-lg shadow-lg shadow-red-100 hover:scale-[1.02] active:scale-[0.98] transition-all">
                    Initialize Terminal
                </button>
            </form>

            <div id="errorMessage"
                class="mt-6 p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-sm font-medium hidden">
                <!-- Error msg here -->
            </div>
        </div>

        <p class="text-center text-slate-400 text-[10px] mt-10 font-bold uppercase tracking-widest opacity-60">
            &copy; 2024 Bitis's Footwear Group • Operational Integrity Guaranteed
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Authenticating...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                window.location.replace(getPostLoginDestination());
            } catch (error) {
                errorMessage.innerText = error.message;
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Initialize Terminal';
            }
        });

        // Check if already logged in
        function getPostLoginDestination() {
            const requestedPath = new URLSearchParams(window.location.search).get('next');
            if (!requestedPath) return 'index.html';

            const destination = new URL(requestedPath, window.location.href);
            if (destination.origin !== window.location.origin || destination.pathname.endsWith('/login.html')) {
                return 'index.html';
            }

            return destination.href;
        }

        async function checkSession() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) {
                window.location.replace(getPostLoginDestination());
            }
        }
        checkSession();
    </script>
    <script src="assets/js/password-toggle.js"></script>
    <script src="assets/js/page-transition.js"></script>
</body>

</html>
